<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zahra's Quest</title>
    <style>
        body {
            background-color: #121212;
            color: #00ffcc; /* Warna neon biar kerasa vibes gaming */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .game-box {
            border: 4px solid #00ffcc;
            padding: 30px;
            background: #1a1a1a;
            box-shadow: 0 0 20px #00ffcc;
            text-align: center;
            max-width: 80%;
            border-radius: 10px;
        }

        h1 { font-size: 1.5rem; margin-bottom: 20px; }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 0.8rem;
            color: #ff85a2;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            position: relative;
            height: 50px;
        }

        button {
            padding: 10px 25px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid #00ffcc;
            background: transparent;
            color: #00ffcc;
            transition: 0.2s;
        }

        button:hover {
            background: #00ffcc;
            color: #1a1a1a;
        }

        #noBtn {
            position: absolute;
            transition: 0.1s;
        }

        /* Pesan Menang */
        #victory-screen {
            display: none;
        }
    </style>
</head>
<body>

    <div id="game-screen" class="game-box">
        <div class="stats">
            <span>PLAYER: ZAHRA</span>
            <span>HP: ❤️❤️❤️</span>
        </div>
        <h1 id="question">SAYANG GAK SAMA AKU?</h1>
        
        <div class="btn-container">
            <button id="yesBtn" onclick="winGame()">SAYANG</button>
            <button id="noBtn" onmouseover="moveButton()">ENGGAK</button>
        </div>
    </div>

    <div id="victory-screen" class="game-box">
        <h1 style="color: #ff85a2;">MISSION ACCOMPLISHED! 🏆</h1>
        <p>You unlocked a special reward:</p>
        <h2 style="color: #fff;">"AKU BAKAL SELALU ADA BUAT KAMU"</h2>
        <button onclick="location.reload()" style="margin-top: 20px;">REPLAY</button>
    </div>

    <script>
        // Fungsi biar tombol "ENGGAK" lari pas dideketin cursor/jari
        function moveButton() {
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 100);
            
            const noBtn = document.getElementById('noBtn');
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        // Fungsi kalau klik "SAYANG"
        function winGame() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('victory-screen').style.display = 'block';
            
            // Tambahin efek konfeti kalau mau lebih seru
            alert("Congratulations! Zahra won my heart! ❤️");
        }
    </script>
</body>
</html>
