<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zahra's Quest Mobile</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: #050505;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            padding: 20px;
        }

        .game-card {
            width: 100%;
            max-width: 400px;
            border: 3px solid #00ffcc;
            padding: 40px 20px;
            background: #111;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
            text-align: center;
            border-radius: 20px;
            position: relative;
        }

        .header {
            font-size: 0.7rem;
            color: #ff4d94;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h1 { font-size: 1.4rem; margin-bottom: 40px; line-height: 1.4; }

        .btn-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 150px;
            position: relative;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 1rem;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            border: 2px solid #00ffcc;
            background: transparent;
            color: #00ffcc;
            border-radius: 50px;
            transition: 0.1s;
        }

        #yesBtn { background: rgba(0, 255, 204, 0.1); }
        #yesBtn:active { background: #00ffcc; color: #000; }

        #noBtn {
            position: absolute;
            width: 100%;
            bottom: 0;
            z-index: 100;
        }

        #victory-screen { display: none; }
        
        .heart-icon { font-size: 50px; margin-bottom: 10px; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>

    <div id="game-screen" class="game-card">
        <div class="header">System: Relationship Quest</div>
        <div class="heart-icon">👾</div>
        <h1 id="question">ZAHRA, MAU JADI<br>SUPPORTER NOMOR 1 AKU TERUS?</h1>
        
        <div class="btn-wrapper">
            <button id="yesBtn" onclick="winGame()">MAU BANGET!</button>
            <button id="noBtn" ontouchstart="moveButton()" onclick="moveButton()">NGGAK MAU</button>
        </div>
    </div>

    <div id="victory-screen" class="game-card">
        <div class="heart-icon">💖</div>
        <h1 style="color: #ff4d94;">MISSION CLEAR!</h1>
        <p style="color: #fff;">Level Up: "Super Partner"</p>
        <p style="font-size: 0.9rem; margin-top: 20px;">I Love You, Zahra!</p>
        <button onclick="location.reload()" style="margin-top: 30px; width: auto; padding: 10px 30px;">REPLAY</button>
    </div>

    <script>
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            
            // Hitung batas aman layar biar gak keluar
            const padding = 50;
            const maxWidth = window.innerWidth - noBtn.offsetWidth - padding;
            const maxHeight = window.innerHeight - noBtn.offsetHeight - padding;
            
            const randomX = Math.max(padding, Math.floor(Math.random() * maxWidth));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxHeight));
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
            noBtn.style.width = '150px'; // Ukuran mengecil pas lari biar susah ditekan
        }
